<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG --- */
  
  /* Das originale, fehlerhafte Theme-Menü restlos ausblenden */
  .site-nav-trigger, .main-nav-trigger, .site-header button { 
    display: none !important; 
  }

  /* Unser neues, intuitives Burger-Menü-Zeichen als direkter Link */
  .custom-burger-link {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 60px;
    display: flex !important;
    align-items: center;
    justify-content: center;
    color: #7253ed !important; /* Das lila Logo-Design des Themes */
    font-size: 1.7rem;
    text-decoration: none !important;
    z-index: 9999;
  }

  /* Auf dem PC blenden wir das mobile Zeichen aus */
  @media (min-width: 50rem) {
    .custom-burger-link { display: none !important; }
  }
</style>

<script>
  // Wir injizieren das Symbol direkt nach dem Laden in die mobile Kopfzeile
  document.addEventListener("DOMContentLoaded", function() {
    // Falls das Theme je nach Version .site-header oder .main-header nutzt:
    var header = document.querySelector(".site-header") || document.querySelector(".main-header");
    if (header) {
      header.style.position = "relative"; // Basis für absolute Positionierung des Icons
      
      var burgerLink = document.createElement("a");
      burgerLink.href = "/";
      burgerLink.className = "custom-burger-link";
      burgerLink.innerHTML = "☰";
      header.appendChild(burgerLink);
    }
  });
</script>
