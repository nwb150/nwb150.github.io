<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }
</style>

<script>
  (function() {
    // Diese Funktion fängt jede Berührung des Burger-Buttons radikal ab
    function hijackBurger(e) {
      var target = e.target;
      if (target && (target.id === 'menu-button' || target.closest('#menu-button'))) {
        e.preventDefault();
        e.stopPropagation();
        window.location.href = '/';
      }
    }

    // 'true' am Ende aktiviert die Capturing-Phase (Abfangen beim Herabsteigen im DOM-Baum)
    window.addEventListener('click', hijackBurger, true);
    window.addEventListener('touchstart', hijackBurger, true);
    window.addEventListener('touchend', hijackBurger, true);
  })();
</script>
