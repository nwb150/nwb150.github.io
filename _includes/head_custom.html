<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG (Reine CSS-Methode) --- */
  @media (max-width: 50rem) {
    /* 1. Das blaue Menü-Dropdown komplett im Keim ersticken */
    .site-nav { 
      display: none !important; 
    }

    /* 2. Dem originalen Burger-Button die Klick-Logik entziehen (wird rein passives Icon) */
    #menu-button { 
      pointer-events: none !important; 
    }

    /* 3. Die obere Kopfzeile für die absolute Ausdehnung vorbereiten */
    .site-header { 
      position: relative !important; 
    }

    /* 4. Den funktionierenden Titel-Link unsichtbar über die GESAMTE obere Zeile legen */
    .site-title::after {
      content: "" !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 99999 !important; /* Liegt über allem, inklusive dem Icon */
    }
  }
</style>
