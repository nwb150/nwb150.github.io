<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* --- PC-LAYOUT (Seitenleiste zur horizontalen Kopfzeile machen) --- */
  @media (min-width: 50rem) {
    /* Die Seitenleiste oben als flache Bar einrasten lassen */
    .side-bar {
      position: static !important;
      display: block !important;
      width: 100% !important;
      height: auto !important;
      padding: 0 !important;
      background-color: #f5f6fa !important; /* Gleicher lila/grauer Hintergrund wie mobil */
      border-right: none !important;
      border-bottom: 1px solid #e9ebf2 !important;
    }

    /* Alles andere in der Seitenleiste (alten Navigationsbaum) ausblenden */
    .side-bar > *:not(.site-header) {
      display: none !important;
    }

    /* Hauptinhalt zentrieren und Abstand nach oben anpassen */
    .main {
      margin-left: 0 !important;
    }
    .main-content {
      max-width: 52rem !important;
      margin: 0 auto !important;
      padding: 2rem 1rem !important;
    }
  }

  /* --- GLOBALE KOPFZEILEN-STYLINGS (Für PC & Mobile) --- */
  
  /* Kopfzeile flexibel ausrichten (Titel links, Burger rechts) */
  .site-header { 
    display: flex !important; 
    position: relative !important; 
    justify-content: space-between !important;
    align-items: center !important;
    padding: 0.75rem 1rem !important;
  }

  /* Das standardmäßige Dropdown-Menü komplett deaktivieren */
  .site-nav { 
    display: none !important; 
  }

  /* Das Burger-Icon auf PC und Handy erzwingen, aber Klicks durchlassen */
  #menu-button, .site-nav-trigger { 
    display: block !important;
    pointer-events: none !important; 
  }

  /* Den Titel-Link als unsichtbare Klickfläche über die GESAMTE Kopfzeile legen */
  .site-title::after {
    content: "" !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 99999 !important;
  }

  /* Blaues Aufblitzen beim Tippen auf Handys verhindern */
  .site-title, .site-title::after, #menu-button, .site-header {
    -webkit-tap-highlight-color: transparent !important;
  }
</style>

{% if page.url == "/" or page.url == "/index.html" %}
<style>
  #menu-button, .site-nav-trigger {
    display: none !important;
  }
</style>
{% endif %}
